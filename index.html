<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>🍽️ Calorie Snap</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Calorie Snap" />

    <!-- iOS icons (Safari uses these for home screen) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Theme color (browser chrome) -->
    <meta name="theme-color" content="#ff7a59" />
    <meta name="msapplication-TileColor" content="#ff7a59" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        background: #fff7ed;
        /* Safe area insets for iPhone notch / Dynamic Island */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
